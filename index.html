<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swift Mobile Browser · AI Chatbot</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* { box-sizing:border-box; margin:0; padding:0; font-family:system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif; }

body {
    background:#000;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.app {
    width:390px;
    height:844px;
    border-radius:28px;
    overflow:hidden;
    position:relative;
    color:white;
    padding-top:40px;
    box-shadow:0 30px 50px rgba(0,0,0,0.7);
    background:#000;
}

.bgvideo {
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    top:0; left:0;
    z-index:0;
}

.overlay { position:absolute; inset:0; background:rgba(0,0,0,0.2); z-index:1; }

/* HEADER */
.header {
    position:relative;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 18px;
    z-index:5;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.header-center {
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    align-items:center;
    gap:8px;
    font-weight:600;
    letter-spacing:3px;
    font-size:18px;
}

.logo-img { width:24px; height:24px; object-fit:contain; }

/* CONTROLS & NEW TAB */
.controls, .newtab {
    display:flex;
    gap:12px;
    padding:10px 16px;
    z-index:5;
}

.controls button, .newtab button {
    background:rgba(255,255,255,0.15);
    border:none;
    color:white;
    padding:10px 12px;
    border-radius:14px;
    cursor:pointer;
    backdrop-filter:blur(4px);
}

.newtab button:first-child {
    background:#8f79ff;
    font-weight:600;
    box-shadow:0 6px 12px rgba(0,0,0,0.4);
}

/* SEARCH */
.search {
    margin:14px 16px;
    background:rgba(255,255,255,0.2);
    border-radius:28px;
    padding:14px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    backdrop-filter:blur(10px);
    position:relative;
    z-index:15;
}

.search input {
    background:transparent;
    border:none;
    outline:none;
    color:white;
    width:100%;
    font-size:14px;
}

.search input::placeholder { color:rgba(255,255,255,0.7); }

.engine-select {
    cursor:pointer;
    padding:6px 10px;
    border-radius:12px;
    background:rgba(255,255,255,0.2);
    font-size:13px;
    white-space:nowrap;
}

.engine-menu {
    position:absolute;
    top:70px;
    right:20px;
    background:rgba(20,20,30,0.95);
    backdrop-filter:blur(20px);
    border-radius:14px;
    overflow:hidden;
    display:none;
    flex-direction:column;
    z-index:20;
    min-width:160px;
}

.engine-menu div {
    padding:12px 16px;
    cursor:pointer;
}

.engine-menu div:hover { background:rgba(255,255,255,0.1); }

.engine-menu.open { display:flex; }

/* APPS GRID */
.grid-container {
    padding:20px 20px 80px 20px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    text-align:center;
}

.appicon {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    font-size:13px;
    cursor:pointer;
}

.iconbox {
    width:58px;
    height:58px;
    border-radius:18px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(255,255,255,0.25);
    backdrop-filter:blur(6px);
    font-size:36px;
    transition:0.2s;
}

.iconbox:hover {
    transform:scale(1.08);
    background:rgba(255,255,255,0.45);
}

/* FOOTER */
.footer {
    position:absolute;
    bottom:16px;
    left:0; right:0;
    display:flex;
    justify-content:center;
    z-index:5;
}

.badge {
    background:rgba(0,0,0,0.7);
    padding:8px 14px;
    border-radius:18px;
    font-size:12px;
    backdrop-filter:blur(4px);
}

/* SIDEBAR */
.sidebar {
    position:absolute;
    top:0; left:-280px;
    width:280px;
    height:100%;
    backdrop-filter:blur(20px);
    transition:left 0.28s ease;
    z-index:999;
    overflow-y:auto;
}

.sidebar.open { left:0; }

.sidebar-content {
    padding:40px 0 80px 0;
}

.menuItem {
    padding:16px 24px;
    display:flex;
    align-items:center;
    gap:14px;
    cursor:pointer;
    font-size:15px;
    transition:background 0.18s;
}

.menuItem:hover { background:rgba(255,255,255,0.08); }

/* CHATBOT */
.chatbot-float {
    position:absolute;
    bottom:85px;
    right:20px;
    width:64px;
    height:64px;
    z-index:25;
    cursor:pointer;
    transition:transform 0.2s;
}

.chatbot-float:hover { transform:scale(1.1); }

.chatbot-float img { width:100%; height:100%; object-fit:contain; }

.chatbot-panel {
    position:absolute;
    bottom:160px;
    right:16px;
    width:340px;
    height:480px;
    background:rgba(20,20,30,0.96);
    backdrop-filter:blur(20px);
    border-radius:24px;
    z-index:30;
    display:none;
    flex-direction:column;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.12);
    box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

.chatbot-panel.open { display:flex; }

.chatbot-header {
    background:linear-gradient(135deg,#667eea,#764ba2);
    padding:16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.chatbot-messages {
    flex:1;
    padding:16px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.message {
    max-width:80%;
    padding:10px 14px;
    border-radius:18px;
    font-size:14px;
    line-height:1.4;
}

.message.user {
    align-self:flex-end;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.message.bot {
    align-self:flex-start;
    background:rgba(255,255,255,0.15);
}

.chatbot-input {
    padding:12px;
    background:rgba(0,0,0,0.3);
    display:flex;
    gap:8px;
    border-top:1px solid rgba(255,255,255,0.1);
}

.chatbot-input input {
    flex:1;
    padding:10px 14px;
    border:none;
    border-radius:20px;
    background:rgba(255,255,255,0.15);
    color:white;
    outline:none;
}

.chatbot-input button {
    width:44px;
    height:44px;
    border:none;
    border-radius:50%;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    cursor:pointer;
    font-size:18px;
}

/* OVERLAY */
#clickOverlay {
    position:absolute;
    inset:0;
    display:none;
    z-index:8;
    background:rgba(0,0,0,0.15);
}

#clickOverlay.active { display:block; }
</style>
</head>
<body>

<div class="app">

    <video class="bgvideo" autoplay muted loop playsinline>
        <source src="https://raw.githubusercontent.com/Saga-Academy/swift-browser/main/RAW/beach05.mp4">
    </video>

    <div class="overlay"></div>
    <div id="clickOverlay"></div>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <div class="menuItem"><i class="fas fa-bookmark"></i> Bookmarks</div>
            <div class="menuItem"><i class="fas fa-history"></i> History</div>
            <div class="menuItem"><i class="fas fa-download"></i> Downloads</div>
            <div class="menuItem"><i class="fas fa-cog"></i> Settings</div>
            <div class="menuItem"><i class="fas fa-info-circle"></i> About</div>
        </div>
    </div>

    <!-- HEADER -->
    <div class="header">
        <i class="fas fa-bars" id="menuToggle"></i>
        <div class="header-center">
            <img src="https://customer-assets.emergentagent.com/job_swift-ai-browser/artifacts/djtirug7_60527.png" class="logo-img" alt="logo">
            <span>SWIFT</span>
        </div>
        <i id="themeToggle" class="fas fa-sun"></i>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
        <button><i class="fas fa-arrow-left"></i></button>
        <button><i class="fas fa-arrow-right"></i></button>
        <button><i class="fas fa-rotate"></i></button>
    </div>

    <!-- NEW TAB -->
    <div class="newtab">
        <button id="newTabBtn">New Tab</button>
        <button id="clearBtn">+</button>
    </div>

    <!-- SEARCH -->
    <div class="search">
        <div class="engine-select" id="engineSelect">
            🌐 <span id="currentEngine">Google</span>
        </div>
        <div class="engine-menu" id="engineMenu">
            <div data-engine="Google">Google</div>
            <div data-engine="Bing">Bing</div>
            <div data-engine="DuckDuckGo">DuckDuckGo</div>
            <div data-engine="YouTube">YouTube</div>
            <div data-engine="Wikipedia">Wikipedia</div>
        </div>
        <input id="searchInput" placeholder="Search or type URL..." autocomplete="off">
    </div>

    <!-- APPS GRID – all clickable -->
    <div class="grid-container">
        <div class="appicon" data-url="https://www.facebook.com"><div class="iconbox"><i class="fab fa-facebook-f"></i></div><div>Facebook</div></div>
        <div class="appicon" data-url="https://www.youtube.com"><div class="iconbox"><i class="fab fa-youtube"></i></div><div>YouTube</div></div>
        <div class="appicon" data-url="https://www.instagram.com"><div class="iconbox"><i class="fab fa-instagram"></i></div><div>Instagram</div></div>
        <div class="appicon" data-url="https://open.spotify.com"><div class="iconbox"><i class="fab fa-spotify"></i></div><div>Spotify</div></div>

        <div class="appicon" data-url="https://x.com"><div class="iconbox"><i class="fab fa-x-twitter"></i></div><div>X</div></div>
        <div class="appicon" data-url="https://www.tiktok.com"><div class="iconbox"><i class="fab fa-tiktok"></i></div><div>TikTok</div></div>
        <div class="appicon" data-url="https://www.snapchat.com"><div class="iconbox"><i class="fab fa-snapchat"></i></div><div>Snapchat</div></div>
        <div class="appicon" data-url="https://www.pinterest.com"><div class="iconbox"><i class="fab fa-pinterest"></i></div><div>Pinterest</div></div>

        <div class="appicon" data-url="https://www.reddit.com"><div class="iconbox"><i class="fab fa-reddit"></i></div><div>Reddit</div></div>
        <div class="appicon" data-url="https://www.linkedin.com"><div class="iconbox"><i class="fab fa-linkedin-in"></i></div><div>LinkedIn</div></div>
        <div class="appicon" data-url="https://news.google.com"><div class="iconbox"><i class="fas fa-newspaper"></i></div><div>News</div></div>
        <div class="appicon" data-url="https://store.steampowered.com"><div class="iconbox"><i class="fas fa-gamepad"></i></div><div>Games</div></div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        <div class="badge">⚡ Swift Browser</div>
    </div>

    <!-- CHATBOT -->
    <div class="chatbot-float" id="chatbotToggle">
        <img src="https://github.com/Saga-Academy/swift-browser/raw/main/RAW/ai.png" alt="AI">
    </div>

    <div class="chatbot-panel" id="chatbotPanel">
        <div class="chatbot-header">
            <h3><i class="fas fa-robot"></i> Swift AI</h3>
            <button id="closeChatbot">×</button>
        </div>
        <div class="chatbot-messages" id="chatbotMessages">
            <div class="message bot">Hi! I'm your Swift AI assistant. How can I help today?</div>
        </div>
        <div class="chatbot-input">
            <input type="text" id="chatbotInput" placeholder="Type a message...">
            <button id="sendBtn">➤</button>
        </div>
    </div>

</div>

<script>
// ────────────────────────────────────────────────
// DOM elements
const sidebar       = document.getElementById('sidebar');
const overlay       = document.getElementById('clickOverlay');
const menuToggle    = document.getElementById('menuToggle');
const chatbotToggle = document.getElementById('chatbotToggle');
const chatbotPanel  = document.getElementById('chatbotPanel');
const closeChatbot  = document.getElementById('closeChatbot');
const chatbotInput  = document.getElementById('chatbotInput');
const sendBtn       = document.getElementById('sendBtn');
const messages      = document.getElementById('chatbotMessages');
const searchInput   = document.getElementById('searchInput');
const engineSelect  = document.getElementById('engineSelect');
const engineMenu    = document.getElementById('engineMenu');
const currentEngine = document.getElementById('currentEngine');

// ────────────────────────────────────────────────
// Sidebar toggle + outside click close
menuToggle.addEventListener('click', e => {
    e.stopPropagation();
    sidebar.classList.toggle('open');
    overlay.classList.toggle('active', sidebar.classList.contains('open'));
});

overlay.addEventListener('click', () => {
    sidebar.classList.remove('open');
    overlay.classList.remove('active');
    engineMenu.classList.remove('open');
});

sidebar.addEventListener('click', e => e.stopPropagation());

// ────────────────────────────────────────────────
// Chatbot open / close / send
chatbotToggle.addEventListener('click', () => {
    chatbotPanel.classList.toggle('open');
    if (chatbotPanel.classList.contains('open')) {
        chatbotInput.focus();
    }
});

closeChatbot.addEventListener('click', () => {
    chatbotPanel.classList.remove('open');
});

function addMessage(text, type = 'bot') {
    const div = document.createElement('div');
    div.className = `message ${type}`;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function getRandomReply() {
    const replies = [
        "That's cool! Tell me more 😊",
        "Interesting... what else?",
        "I'm just a demo AI — real version coming soon!",
        "Ask me about the weather or news!",
        "Swift Browser is pretty fast, right? ⚡",
        "Do you want to search something specific?",
        "😄 Haha that's funny!",
        "I'm learning every day — ask anything!",
        "How's the day going in Cebu? 🌴"
    ];
    return replies[Math.floor(Math.random() * replies.length)];
}

sendBtn.addEventListener('click', sendChatMessage);
chatbotInput.addEventListener('keypress', e => {
    if (e.key === 'Enter') sendChatMessage();
});

function sendChatMessage() {
    const text = chatbotInput.value.trim();
    if (!text) return;

    addMessage(text, 'user');
    chatbotInput.value = '';

    // simulate thinking
    setTimeout(() => {
        addMessage(getRandomReply());
    }, 600 + Math.random() * 800);
}

// ────────────────────────────────────────────────
// Search + engine selector
let currentEngineValue = "Google";

engineSelect.addEventListener('click', e => {
    e.stopPropagation();
    engineMenu.classList.toggle('open');
});

engineMenu.querySelectorAll('div').forEach(item => {
    item.addEventListener('click', () => {
        currentEngineValue = item.dataset.engine;
        currentEngine.textContent = currentEngineValue;
        engineMenu.classList.remove('open');
    });
});

searchInput.addEventListener('keypress', e => {
    if (e.key !== 'Enter') return;
    const q = searchInput.value.trim();
    if (!q) return;

    let url = '';
    switch (currentEngineValue) {
        case 'Google':      url = `https://www.google.com/search?q=${encodeURIComponent(q)}`; break;
        case 'Bing':        url = `https://www.bing.com/search?q=${encodeURIComponent(q)}`; break;
        case 'DuckDuckGo':  url = `https://duckduckgo.com/?q=${encodeURIComponent(q)}`; break;
        case 'YouTube':     url = `https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`; break;
        case 'Wikipedia':   url = `https://en.wikipedia.org/wiki/Special:Search?search=${encodeURIComponent(q)}`; break;
        default:            url = `https://www.google.com/search?q=${encodeURIComponent(q)}`;
    }
    window.open(url, '_blank');
});

// ────────────────────────────────────────────────
// App icons – open websites
document.querySelectorAll('.appicon[data-url]').forEach(icon => {
    icon.addEventListener('click', () => {
        window.open(icon.dataset.url, '_blank');
    });
});

// New tab + clear
document.getElementById('newTabBtn').addEventListener('click', () => {
    window.open('about:blank', '_blank');
});

document.getElementById('clearBtn').addEventListener('click', () => {
    searchInput.value = '';
    searchInput.focus();
});

</script>

</body>
</html>
