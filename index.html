<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swift Mobile Browser · AI Chatbot</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,Arial;}

body{
background:#000;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.app{
width:390px;
height:844px;
border-radius:28px;
overflow:hidden;
position:relative;
color:white;
padding-top:40px;
box-shadow:0 30px 50px rgba(0,0,0,0.7);
}

.bgvideo{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
top:0;
left:0;
z-index:0;
}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.2);
}

/* ===== HEADER ===== */
.header{
position:relative;
display:flex;
align-items:center;
justify-content:space-between;
padding:16px 18px;
z-index:5;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,0.1);
}

.header::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(90deg,#ff7eb3,#8f79ff,#7afcff);
opacity:0.15;
z-index:-1;
}

/* CENTER LOGO */
.header-center{
position:absolute;
left:50%;
transform:translateX(-50%);
display:flex;
align-items:center;
gap:8px;
font-weight:600;
letter-spacing:3px;
font-size:18px;
}

.logo-img{
width:24px;
height:24px;
object-fit:contain;
display:block;
}

/* ICONS */
.header i{
font-size:18px;
cursor:pointer;
opacity:0.85;
transition:0.2s;
}

.header i:hover{
opacity:1;
transform:scale(1.1);
}

/* controls */
.controls{
display:flex;
gap:12px;
padding:10px 16px;
}

.controls button{
background:rgba(255,255,255,0.15);
border:none;
color:white;
padding:10px 12px;
border-radius:14px;
cursor:pointer;
backdrop-filter:blur(4px);
}

/* new tab */
.newtab{
padding:10px 16px;
display:flex;
gap:10px;
}

.newtab button{
border:none;
padding:10px 16px;
border-radius:14px;
background:#8f79ff;
color:white;
font-weight:600;
cursor:pointer;
box-shadow:0 6px 12px rgba(0,0,0,0.4);
}

/* search */
.search{
margin:14px 16px;
background:rgba(255,255,255,0.2);
border-radius:28px;
padding:14px 18px;
display:flex;
align-items:center;
justify-content:space-between;
backdrop-filter:blur(10px);
}

.search input{
background:transparent;
border:none;
outline:none;
color:white;
width:100%;
font-size:14px;
}

.search input::placeholder{
color:rgba(255,255,255,0.7);
}

/* apps */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:20px;
text-align:center;
}

.appicon{
display:flex;
flex-direction:column;
align-items:center;
gap:6px;
font-size:13px;
}

.iconbox{
width:58px;
height:58px;
border-radius:18px;
display:flex;
justify-content:center;
align-items:center;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(6px);
font-size:22px;
cursor:pointer;
transition:0.2s;
}

.iconbox:hover{
transform:scale(1.08);
background:rgba(255,255,255,0.4);
}

/* footer */
.footer{
position:absolute;
bottom:16px;
left:0;
right:0;
display:flex;
justify-content:center;
}

.badge{
background:black;
padding:8px 14px;
border-radius:18px;
font-size:12px;
opacity:0.8;
}

/* sidebar */
.sidebar{
position:absolute;
top:0;
left:-260px;
width:260px;
height:100%;
background:rgba(20,20,30,0.6);
backdrop-filter:blur(20px);
padding-top:80px;
transition:left 0.25s ease;
z-index:10;
}

.sidebar.open{left:0;}

.menuItem{
padding:16px 22px;
cursor:pointer;
display:flex;
gap:12px;
}

/* ===== CHATBOT STYLES ===== */
.chatbot-float{
position:absolute;
bottom:85px;
right:20px;
width:60px;
height:60px;
z-index:25;
cursor:pointer;
transition:transform 0.2s;
}

.chatbot-float:hover{
transform:scale(1.1);
}

.chatbot-float img{
width:100%;
height:100%;
object-fit:contain;
}

.chatbot-panel{
position:absolute;
bottom:160px;
right:20px;
width:320px;
height:450px;
background:rgba(20,20,30,0.95);
backdrop-filter:blur(20px);
border-radius:24px;
z-index:30;
display:none;
flex-direction:column;
overflow:hidden;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 10px 40px rgba(0,0,0,0.5);
animation:slideUp 0.3s ease;
}

@keyframes slideUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.chatbot-panel.open{
display:flex;
}

.chatbot-header{
background:linear-gradient(135deg,#8f79ff,#7afcff);
padding:16px;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
}

.chatbot-header h3{
font-size:16px;
display:flex;
align-items:center;
gap:8px;
}

.chatbot-header button{
background:none;
border:none;
color:white;
font-size:20px;
cursor:pointer;
opacity:0.8;
transition:0.2s;
}

.chatbot-header button:hover{
opacity:1;
transform:scale(1.1);
}

.chatbot-messages{
flex:1;
padding:16px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:12px;
}

.message{
max-width:85%;
padding:10px 14px;
border-radius:18px;
font-size:13px;
line-height:1.4;
word-wrap:break-word;
animation:messagePop 0.2s ease;
}

@keyframes messagePop{
from{transform:scale(0.9);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.message.user{
align-self:flex-end;
background:linear-gradient(135deg,#8f79ff,#7afcff);
color:white;
border-bottom-right-radius:4px;
}

.message.bot{
align-self:flex-start;
background:rgba(255,255,255,0.15);
color:white;
border-bottom-left-radius:4px;
}

.message.error{
align-self:center;
background:rgba(255,80,80,0.3);
color:#ff9999;
font-size:11px;
max-width:90%;
text-align:center;
}

.typing-indicator{
display:flex;
gap:4px;
padding:12px 16px;
background:rgba(255,255,255,0.1);
border-radius:18px;
width:fit-content;
}

.typing-indicator span{
width:6px;
height:6px;
background:rgba(255,255,255,0.5);
border-radius:50%;
animation:typing 1.4s infinite;
}

.typing-indicator span:nth-child(2){animation-delay:0.2s;}
.typing-indicator span:nth-child(3){animation-delay:0.4s;}

@keyframes typing{
0%,60%,100%{transform:translateY(0);opacity:0.5;}
30%{transform:translateY(-6px);opacity:1;}
}

.chatbot-input{
padding:12px;
background:rgba(0,0,0,0.3);
display:flex;
gap:8px;
border-top:1px solid rgba(255,255,255,0.1);
}

.chatbot-input input{
flex:1;
padding:10px 14px;
border:none;
border-radius:20px;
background:rgba(255,255,255,0.15);
color:white;
font-size:13px;
outline:none;
}

.chatbot-input input::placeholder{
color:rgba(255,255,255,0.5);
}

.chatbot-input input:disabled{
opacity:0.5;
cursor:not-allowed;
}

.chatbot-input button{
width:36px;
height:36px;
border:none;
border-radius:50%;
background:linear-gradient(135deg,#8f79ff,#7afcff);
color:white;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
transition:0.2s;
}

.chatbot-input button:hover:not(:disabled){
transform:scale(1.1);
}

.chatbot-input button:disabled{
opacity:0.5;
cursor:not-allowed;
}

/* overlay click */
#clickOverlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
z-index:8;
}

#clickOverlay.active{display:block;}

</style>
</head>

<body>

<div class="app">

<video class="bgvideo" autoplay muted loop playsinline>
<source src="https://raw.githubusercontent.com/Saga-Academy/swift-browser/main/RAW/beach04.mp4">
</video>

<div class="overlay"></div>
<div id="clickOverlay"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<div class="menuItem"><i class="fas fa-bookmark"></i> Bookmarks</div>
<div class="menuItem"><i class="fas fa-history"></i> History</div>
<div class="menuItem"><i class="fas fa-info-circle"></i> About</div>
</div>

<!-- HEADER -->
<div class="header">

<i class="fas fa-bars" onclick="toggleMenu()"></i>

<div class="header-center">
<img src="https://customer-assets.emergentagent.com/job_swift-ai-browser/artifacts/djtirug7_60527.png" class="logo-img">
<span>SWIFT</span>
</div>

<i id="themeToggle" class="fas fa-sun"></i>

</div>

<!-- controls -->
<div class="controls">
<button onclick="history.back()"><i class="fas fa-arrow-left"></i></button>
<button onclick="history.forward()"><i class="fas fa-arrow-right"></i></button>
<button onclick="location.reload()"><i class="fas fa-rotate"></i></button>
</div>

<!-- new tab -->
<div class="newtab">
<button>New Tab</button>
<button>+</button>
</div>

<!-- search -->
<div class="search">
<input placeholder="Search the World Wide Web...">
<div>🌐 Internet</div>
</div>

<!-- apps -->
<div class="grid">
<div class="appicon"><div class="iconbox"><i class="fab fa-facebook"></i></div>Facebook</div>
<div class="appicon"><div class="iconbox"><i class="fab fa-youtube"></i></div>YouTube</div>
<div class="appicon"><div class="iconbox"><i class="fab fa-instagram"></i></div>Instagram</div>
<div class="appicon"><div class="iconbox"><i class="fab fa-spotify"></i></div>Spotify</div>
</div>

<!-- footer -->
<div class="footer">
<div class="badge">⚡ Swift AI</div>
</div>

<!-- CHATBOT FLOATING ICON AND PANEL -->
<div class="chatbot-float" id="chatbotToggle">
<img src="https://github.com/Saga-Academy/swift-browser/blob/main/RAW/ai.png?raw=true">
</div>

<div class="chatbot-panel" id="chatbotPanel">
<div class="chatbot-header">
<h3><i class="fas fa-robot"></i> Swift AI Assistant</h3>
<button id="closeChatbot"><i class="fas fa-times"></i></button>
</div>
<div class="chatbot-messages" id="chatbotMessages">
<div class="message bot">
👋 Hi! I'm your Swift AI assistant. Ask me anything about browsing, search the web, or just chat!
</div>
</div>
<div class="chatbot-input">
<input type="text" id="chatbotInput" placeholder="Type your message..." disabled>
<button id="sendMessage" disabled><i class="fas fa-paper-plane"></i></button>
</div>
</div>

</div>

<script>
// ========== SIDEBAR TOGGLE ==========
function toggleMenu(){
document.getElementById("sidebar").classList.toggle("open");
}

// ========== CHATBOT FUNCTIONALITY ==========
document.addEventListener('DOMContentLoaded', function() {
    const chatbotToggle = document.getElementById('chatbotToggle');
    const chatbotPanel = document.getElementById('chatbotPanel');
    const closeChatbot = document.getElementById('closeChatbot');
    const chatbotInput = document.getElementById('chatbotInput');
    const sendButton = document.getElementById('sendMessage');
    const messagesContainer = document.getElementById('chatbotMessages');
    
    let isOpen = false;
    let isLoading = false;
    
    // FREE API endpoint (using a public echo API for demo - replace with your actual API)
    // For a real chatbot, replace with your API endpoint
    const API_URL = 'https://api.openai.com/v1/chat/completions'; // Replace with your API
    const API_KEY = 'YOUR_API_KEY'; // ⚠️ IMPORTANT: Replace with your actual API key
    
    // Demo mode - uses simulated responses if no API key
    const useDemoMode = true; // Set to false when you have a real API key
    
    // Simple responses for demo mode
    const demoResponses = [
        "That's interesting! Tell me more.",
        "I'm your Swift AI assistant. How can I help you browse better?",
        "You can ask me to search for websites, find information, or just chat!",
        "The weather is nice today for browsing! ☀️",
        "Swift Browser makes your mobile experience faster and smarter.",
        "I'm here to help you navigate the web more efficiently.",
        "That's a great question about browsing!",
        "You can customize your Swift Browser experience in settings.",
        "I'm learning new things every day to assist you better!"
    ];
    
    // Open chatbot
    chatbotToggle.addEventListener('click', function() {
        chatbotPanel.classList.add('open');
        chatbotInput.disabled = false;
        chatbotInput.focus();
        isOpen = true;
        
        // Enable send button if there's text
        if (chatbotInput.value.trim()) {
            sendButton.disabled = false;
        }
    });
    
    // Close chatbot
    closeChatbot.addEventListener('click', function() {
        chatbotPanel.classList.remove('open');
        chatbotInput.disabled = true;
        sendButton.disabled = true;
        isOpen = false;
    });
    
    // Enable/disable send button based on input
    chatbotInput.addEventListener('input', function() {
        if (isOpen && !isLoading) {
            sendButton.disabled = !this.value.trim();
        }
    });
    
    // Handle enter key
    chatbotInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && !e.shiftKey && !sendButton.disabled && !isLoading) {
            e.preventDefault();
            sendMessage();
        }
    });
    
    // Send message
    sendButton.addEventListener('click', function() {
        if (!sendButton.disabled && !isLoading) {
            sendMessage();
        }
    });
    
    function addMessage(text, sender) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender}`;
        messageDiv.textContent = text;
        messagesContainer.appendChild(messageDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    function showTypingIndicator() {
        const indicator = document.createElement('div');
        indicator.className = 'typing-indicator';
        indicator.id = 'typingIndicator';
        indicator.innerHTML = '<span></span><span></span><span></span>';
        messagesContainer.appendChild(indicator);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    function removeTypingIndicator() {
        const indicator = document.getElementById('typingIndicator');
        if (indicator) {
            indicator.remove();
        }
    }
    
    async function sendMessage() {
        const message = chatbotInput.value.trim();
        if (!message || isLoading) return;
        
        // Add user message
        addMessage(message, 'user');
        chatbotInput.value = '';
        sendButton.disabled = true;
        
        // Show typing indicator
        isLoading = true;
        showTypingIndicator();
        
        try {
            let botResponse;
            
            if (useDemoMode || !API_KEY || API_KEY === 'YOUR_API_KEY') {
                // Demo mode - simulated responses
                await new Promise(resolve => setTimeout(resolve, 1000)); // Simulate thinking
                const randomIndex = Math.floor(Math.random() * demoResponses.length);
                botResponse = demoResponses[randomIndex];
                
                // Add some context to responses based on user message
                if (message.toLowerCase().includes('hello') || message.toLowerCase().includes('hi')) {
                    botResponse = "Hello! How can I assist you with your browsing today?";
                } else if (message.toLowerCase().includes('search') || message.toLowerCase().includes('find')) {
                    botResponse = "You can use the search bar at the top to search the web. What would you like to find?";
                } else if (message.toLowerCase().includes('weather')) {
                    botResponse = "I can help you check the weather! Just type 'weather [city]' in the search bar.";
                } else if (message.toLowerCase().includes('thank')) {
                    botResponse = "You're welcome! Happy browsing! 😊";
                } else if (message.toLowerCase().includes('who are you')) {
                    botResponse = "I'm Swift AI, your intelligent browsing assistant built into this mobile browser!";
                }
            } else {
                // Real API mode - replace with your actual API call
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-3.5-turbo',
                        messages: [
                            {role: 'system', content: 'You are Swift AI, a helpful browsing assistant.'},
                            {role: 'user', content: message}
                        ],
                        temperature: 0.7,
                        max_tokens: 150
                    })
                });
                
                if (!response.ok) {
                    throw new Error('API request failed');
                }
                
                const data = await response.json();
                botResponse = data.choices[0].message.content;
            }
            
            // Remove typing indicator and add bot response
            removeTypingIndicator();
            addMessage(botResponse, 'bot');
            
        } catch (error) {
            console.error('Chatbot error:', error);
            removeTypingIndicator();
            addMessage('Sorry, I encountered an error. Please try again.', 'error');
        } finally {
            isLoading = false;
            if (isOpen) {
                chatbotInput.disabled = false;
                chatbotInput.focus();
                // Only enable send if there's text
                if (chatbotInput.value.trim()) {
                    sendButton.disabled = false;
                }
            }
        }
    }
    
    // Optional: Add some quick suggestions
    const suggestions = [
        "What can you do?",
        "Search the web",
        "Tell me a joke",
        "Weather today"
    ];
    
    // You can uncomment this to add suggestion chips
    /*
    const suggestionsDiv = document.createElement('div');
    suggestionsDiv.style.padding = '8px 12px';
    suggestionsDiv.style.display = 'flex';
    suggestionsDiv.style.gap = '8px';
    suggestionsDiv.style.flexWrap = 'wrap';
    suggestionsDiv.style.borderTop = '1px solid rgba(255,255,255,0.1)';
    
    suggestions.forEach(text => {
        const chip = document.createElement('span');
        chip.textContent = text;
        chip.style.padding = '4px 10px';
        chip.style.background = 'rgba(255,255,255,0.1)';
        chip.style.borderRadius = '16px';
        chip.style.fontSize = '11px';
        chip.style.cursor = 'pointer';
        chip.onclick = () => {
            chatbotInput.value = text;
            sendMessage();
        };
        suggestionsDiv.appendChild(chip);
    });
    
    document.querySelector('.chatbot-input').before(suggestionsDiv);
    */
});

// ========== SEARCH FUNCTIONALITY ==========
const searchInput = document.querySelector('.search input');
if (searchInput) {
    searchInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            const query = this.value.trim();
            if (query) {
                // Open in new tab (simulated)
                window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}`, '_blank');
            }
        }
    });
}

// ========== THEME TOGGLE ==========
const themeToggle = document.getElementById('themeToggle');
let isLightMode = false;

themeToggle.addEventListener('click', function() {
    isLightMode = !isLightMode;
    if (isLightMode) {
        document.querySelector('.app').style.background = '#fff';
        document.querySelector('.app').style.color = '#000';
        themeToggle.className = 'fas fa-moon';
    } else {
        document.querySelector('.app').style.background = '#000';
        document.querySelector('.app').style.color = 'white';
        themeToggle.className = 'fas fa-sun';
    }
});

// ========== APP ICON ACTIONS ==========
document.querySelectorAll('.appicon').forEach((item, index) => {
    item.addEventListener('click', function() {
        const apps = ['facebook', 'youtube', 'instagram', 'spotify'];
        const urls = {
            facebook: 'https://facebook.com',
            youtube: 'https://youtube.com',
            instagram: 'https://instagram.com',
            spotify: 'https://open.spotify.com'
        };
        window.open(urls[apps[index]], '_blank');
    });
});

// ========== NEW TAB BUTTON ==========
document.querySelector('.newtab button:first-child').addEventListener('click', function() {
    window.open('about:blank', '_blank');
});

document.querySelector('.newtab button:last-child').addEventListener('click', function() {
    // Simulate new tab with empty search
    searchInput.value = '';
    searchInput.focus();
});

</script>

</body>
</html>
