<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swift Mobile Browser · floating chatbot</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,Arial;}

body{
background:#000;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.app{
width:390px;
height:844px;
border-radius:28px;
overflow:hidden;
position:relative;
color:white;
padding-top:40px; /* ✅ added */
box-shadow:0 30px 50px rgba(0,0,0,0.7);
}

.bgvideo{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
top:0;
left:0;
z-index:0;
}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.2);
}

/* ===== HEADER ===== */
.header{
position:relative;
display:flex;
align-items:center;
justify-content:space-between;
padding:16px 18px;
z-index:5;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,0.1);
}

.header::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(90deg,#ff7eb3,#8f79ff,#7afcff);
opacity:0.15;
z-index:-1;
}

/* CENTER LOGO */
.header-center{
position:absolute;
left:50%;
transform:translateX(-50%);
display:flex;
align-items:center;
gap:8px;
font-weight:600;
letter-spacing:3px;
font-size:18px;
}

/* ✅ FIX: LOGO SIZE */
.logo-img{
width:24px;
height:24px;
object-fit:contain;
display:block;
}

/* ICONS */
.header i{
font-size:18px;
cursor:pointer;
opacity:0.85;
transition:0.2s;
}

.header i:hover{
opacity:1;
transform:scale(1.1);
}

/* controls */
.controls{
display:flex;
gap:12px;
padding:10px 16px;
}

.controls button{
background:rgba(255,255,255,0.15);
border:none;
color:white;
padding:10px 12px;
border-radius:14px;
cursor:pointer;
backdrop-filter:blur(4px);
}

/* new tab */
.newtab{
padding:10px 16px;
display:flex;
gap:10px;
}

.newtab button{
border:none;
padding:10px 16px;
border-radius:14px;
background:#8f79ff;
color:white;
font-weight:600;
cursor:pointer;
box-shadow:0 6px 12px rgba(0,0,0,0.4);
}

/* search */
.search{
margin:14px 16px;
background:rgba(255,255,255,0.2);
border-radius:28px;
padding:14px 18px;
display:flex;
align-items:center;
justify-content:space-between;
backdrop-filter:blur(10px);
}

.search input{
background:transparent;
border:none;
outline:none;
color:white;
width:100%;
font-size:14px;
}

.search input::placeholder{
color:rgba(255,255,255,0.7);
}

/* apps */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:20px;
text-align:center;
}

.appicon{
display:flex;
flex-direction:column;
align-items:center;
gap:6px;
font-size:13px;
}

.iconbox{
width:58px;
height:58px;
border-radius:18px;
display:flex;
justify-content:center;
align-items:center;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(6px);
font-size:22px;
cursor:pointer;
transition:0.2s;
}

.iconbox:hover{
transform:scale(1.08);
background:rgba(255,255,255,0.4);
}

/* footer */
.footer{
position:absolute;
bottom:16px;
left:0;
right:0;
display:flex;
justify-content:center;
}

.badge{
background:black;
padding:8px 14px;
border-radius:18px;
font-size:12px;
opacity:0.8;
}

/* sidebar */
.sidebar{
position:absolute;
top:0;
left:-260px;
width:260px;
height:100%;
background:rgba(20,20,30,0.6);
backdrop-filter:blur(20px);
padding-top:80px;
transition:left 0.25s ease;
z-index:10;
}

.sidebar.open{left:0;}

.menuItem{
padding:16px 22px;
cursor:pointer;
display:flex;
gap:12px;
}

/* chatbot */
.chatbot-float{
position:absolute;
bottom:85px;
right:20px;
width:60px;
height:60px;
z-index:25;
cursor:pointer;
}

.chatbot-float img{
width:100%;
height:100%;
object-fit:contain;
}

/* overlay click */
#clickOverlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
z-index:8;
}

#clickOverlay.active{display:block;}

</style>
</head>

<body>

<div class="app">

<video class="bgvideo" autoplay muted loop playsinline>
<source src="https://raw.githubusercontent.com/Saga-Academy/swift-browser/main/RAW/beach04.mp4">
</video>

<div class="overlay"></div>
<div id="clickOverlay"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<div class="menuItem">Bookmarks</div>
<div class="menuItem">History</div>
<div class="menuItem">About</div>
</div>

<!-- HEADER -->
<div class="header">

<i class="fas fa-bars" onclick="toggleMenu()"></i>

<div class="header-center">
<img src="https://customer-assets.emergentagent.com/job_swift-ai-browser/artifacts/djtirug7_60527.png" class="logo-img">
<span>SWIFT</span>
</div>

<i id="themeToggle" class="fas fa-sun"></i>

</div>

<!-- controls -->
<div class="controls">
<button onclick="history.back()"><i class="fas fa-arrow-left"></i></button>
<button onclick="history.forward()"><i class="fas fa-arrow-right"></i></button>
<button onclick="location.reload()"><i class="fas fa-rotate"></i></button>
</div>

<!-- new tab -->
<div class="newtab">
<button>New Tab</button>
<button>+</button>
</div>

<!-- search -->
<div class="search">
<input placeholder="Search the World Wide Web...">
<div>🌐 Internet</div>
</div>

<!-- apps -->
<div class="grid">
<div class="appicon"><div class="iconbox"><i class="fab fa-facebook"></i></div>Facebook</div>
<div class="appicon"><div class="iconbox"><i class="fab fa-youtube"></i></div>YouTube</div>
<div class="appicon"><div class="iconbox"><i class="fab fa-instagram"></i></div>Instagram</div>
<div class="appicon"><div class="iconbox"><i class="fab fa-spotify"></i></div>Spotify</div>
</div>

<!-- footer -->
<div class="footer">
<div class="badge">⚡ Swift UI</div>
</div>

<!-- chatbot -->
<div class="chatbot-float">
<img src="https://github.com/Saga-Academy/swift-browser/blob/main/RAW/ai.png?raw=true">
</div>

</div>

<script>
function toggleMenu(){
document.getElementById("sidebar").classList.toggle("open");
}
</script>

</body>
</html>
