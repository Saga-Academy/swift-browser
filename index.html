<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swift Mobile Browser · AI Chatbot</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,'Segoe UI',Roboto,Arial;}

body{
background:#000;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.app{
width:390px;
height:844px;
border-radius:28px;
overflow:hidden;
position:relative;
color:white;
padding-top:40px;
box-shadow:0 30px 50px rgba(0,0,0,0.7);
}

.bgvideo{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
top:0;
left:0;
z-index:0;
}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.2);
}

/* ===== HEADER ===== */
.header{
position:relative;
display:flex;
align-items:center;
justify-content:space-between;
padding:16px 18px;
z-index:5;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,0.1);
}

.header::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(90deg,#ff7eb3,#8f79ff,#7afcff);
opacity:0.15;
z-index:-1;
}

/* CENTER LOGO */
.header-center{
position:absolute;
left:50%;
transform:translateX(-50%);
display:flex;
align-items:center;
gap:8px;
font-weight:600;
letter-spacing:3px;
font-size:18px;
}

.logo-img{
width:24px;
height:24px;
object-fit:contain;
display:block;
}

/* ICONS */
.header i{
font-size:18px;
cursor:pointer;
opacity:0.85;
transition:0.2s;
}

.header i:hover{
opacity:1;
transform:scale(1.1);
}

/* controls */
.controls{
display:flex;
gap:12px;
padding:10px 16px;
}

.controls button{
background:rgba(255,255,255,0.15);
border:none;
color:white;
padding:10px 12px;
border-radius:14px;
cursor:pointer;
backdrop-filter:blur(4px);
}

/* new tab */
.newtab{
padding:10px 16px;
display:flex;
gap:10px;
}

.newtab button{
border:none;
padding:10px 16px;
border-radius:14px;
background:#8f79ff;
color:white;
font-weight:600;
cursor:pointer;
box-shadow:0 6px 12px rgba(0,0,0,0.4);
}

/* search */
.search{
margin:14px 16px;
background:rgba(255,255,255,0.2);
border-radius:28px;
padding:14px 18px;
display:flex;
align-items:center;
justify-content:space-between;
backdrop-filter:blur(10px);
position:relative;
z-index:15;
}

.search input{
background:transparent;
border:none;
outline:none;
color:white;
width:100%;
font-size:14px;
}

.search input::placeholder{
color:rgba(255,255,255,0.7);
}

.engine-select{
cursor:pointer;
padding:6px 10px;
border-radius:12px;
background:rgba(255,255,255,0.2);
font-size:13px;
white-space:nowrap;
}

.engine-menu{
position:absolute;
top:70px;
right:20px;
background:rgba(20,20,30,0.95);
backdrop-filter:blur(20px);
border-radius:14px;
overflow:hidden;
display:none;
flex-direction:column;
z-index:20;
min-width:140px;
}

.engine-menu div{
padding:12px 16px;
cursor:pointer;
transition:0.2s;
}

.engine-menu div:hover{
background:rgba(255,255,255,0.1);
}

.engine-menu.open{
display:flex;
}

/* apps */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:20px;
text-align:center;
}

.appicon{
display:flex;
flex-direction:column;
align-items:center;
gap:6px;
font-size:13px;
cursor:pointer;
}

.iconbox{
width:58px;
height:58px;
border-radius:18px;
display:flex;
justify-content:center;
align-items:center;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(6px);
font-size:22px;
cursor:pointer;
transition:0.2s;
}

.iconbox:hover{
transform:scale(1.08);
background:rgba(255,255,255,0.4);
}

/* footer */
.footer{
position:absolute;
bottom:16px;
left:0;
right:0;
display:flex;
justify-content:center;
}

.badge{
background:black;
padding:8px 14px;
border-radius:18px;
font-size:12px;
opacity:0.8;
}

/* sidebar */
.sidebar{
position:absolute;
top:0;
left:-260px;
width:260px;
height:100%;
background:rgba(20,20,30,0.6);
backdrop-filter:blur(20px);
padding-top:80px;
transition:left 0.25s ease;
z-index:10;
}

.sidebar.open{left:0;}

.menuItem{
padding:16px 22px;
cursor:pointer;
display:flex;
gap:12px;
}

/* ===== CHATBOT STYLES ===== */
.chatbot-float{
position:absolute;
bottom:85px;
right:20px;
width:60px;
height:60px;
z-index:25;
cursor:pointer;
transition:transform 0.2s;
}

.chatbot-float:hover{
transform:scale(1.1);
}

.chatbot-float img{
width:100%;
height:100%;
object-fit:contain;
}

.chatbot-panel{
position:absolute;
bottom:160px;
right:20px;
width:320px;
height:450px;
background:rgba(20,20,30,0.95);
backdrop-filter:blur(20px);
border-radius:24px;
z-index:30;
display:none;
flex-direction:column;
overflow:hidden;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 10px 40px rgba(0,0,0,0.5);
animation:slideUp 0.3s ease;
}

@keyframes slideUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.chatbot-panel.open{
display:flex;
}

.chatbot-header{
background:linear-gradient(135deg,#8f79ff,#7afcff);
padding:16px;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
}

.chatbot-header h3{
font-size:16px;
display:flex;
align-items:center;
gap:8px;
}

.chatbot-header button{
background:none;
border:none;
color:white;
font-size:20px;
cursor:pointer;
opacity:0.8;
transition:0.2s;
}

.chatbot-header button:hover{
opacity:1;
transform:scale(1.1);
}

.chatbot-messages{
flex:1;
padding:16px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:12px;
}

.message{
max-width:85%;
padding:10px 14px;
border-radius:18px;
font-size:13px;
line-height:1.4;
word-wrap:break-word;
animation:messagePop 0.2s ease;
}

@keyframes messagePop{
from{transform:scale(0.9);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.message.user{
align-self:flex-end;
background:linear-gradient(135deg,#8f79ff,#7afcff);
color:white;
border-bottom-right-radius:4px;
}

.message.bot{
align-self:flex-start;
background:rgba(255,255,255,0.15);
color:white;
border-bottom-left-radius:4px;
}

.message.error{
align-self:center;
background:rgba(255,80,80,0.3);
color:#ff9999;
font-size:11px;
max-width:90%;
text-align:center;
}

.typing-indicator{
display:flex;
gap:4px;
padding:12px 16px;
background:rgba(255,255,255,0.1);
border-radius:18px;
width:fit-content;
}

.typing-indicator span{
width:6px;
height:6px;
background:rgba(255,255,255,0.5);
border-radius:50%;
animation:typing 1.4s infinite;
}

.typing-indicator span:nth-child(2){animation-delay:0.2s;}
.typing-indicator span:nth-child(3){animation-delay:0.4s;}

@keyframes typing{
0%,60%,100%{transform:translateY(0);opacity:0.5;}
30%{transform:translateY(-6px);opacity:1;}
}

.chatbot-input{
padding:12px;
background:rgba(0,0,0,0.3);
display:flex;
gap:8px;
border-top:1px solid rgba(255,255,255,0.1);
}

.chatbot-input input{
flex:1;
padding:10px 14px;
border:none;
border-radius:20px;
background:rgba(255,255,255,0.15);
color:white;
font-size:13px;
outline:none;
}

.chatbot-input input::placeholder{
color:rgba(255,255,255,0.5);
}

.chatbot-input input:disabled{
opacity:0.5;
cursor:not-allowed;
}

.chatbot-input button{
width:36px;
height:36px;
border:none;
border-radius:50%;
background:linear-gradient(135deg,#8f79ff,#7afcff);
color:white;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
transition:0.2s;
}

.chatbot-input button:hover:not(:disabled){
transform:scale(1.1);
}

.chatbot-input button:disabled{
opacity:0.5;
cursor:not-allowed;
}

/* overlay click */
#clickOverlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
z-index:8;
}

#clickOverlay.active{display:block;}

</style>
</head>

<body>

<div class="app">

<video class="bgvideo" autoplay muted loop playsinline>
<source src="https://raw.githubusercontent.com/Saga-Academy/swift-browser/main/RAW/beach05.mp4">
</video>

<div class="overlay"></div>
<div id="clickOverlay"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<div class="menuItem"><i class="fas fa-bookmark"></i> Bookmarks</div>
<div class="menuItem"><i class="fas fa-history"></i> History</div>
<div class="menuItem"><i class="fas fa-info-circle"></i> About</div>
</div>

<!-- HEADER -->
<div class="header">

<i class="fas fa-bars" onclick="toggleMenu()"></i>

<div class="header-center">
<img src="https://customer-assets.emergentagent.com/job_swift-ai-browser/artifacts/djtirug7_60527.png" class="logo-img" alt="logo">
<span>SWIFT</span>
</div>

<i id="themeToggle" class="fas fa-sun"></i>

</div>

<!-- controls -->
<div class="controls">
<button onclick="history.back()"><i class="fas fa-arrow-left"></i></button>
<button onclick="history.forward()"><i class="fas fa-arrow-right"></i></button>
<button onclick="location.reload()"><i class="fas fa-rotate"></i></button>
</div>

<!-- new tab -->
<div class="newtab">
<button>New Tab</button>
<button>+</button>
</div>

<div class="search">
    <input id="searchInput" placeholder="Search the World Wide Web...">

    <div class="engine-select" onclick="toggleEngineMenu()">
        🌐 <span id="currentEngine">Google</span>
    </div>

    <div class="engine-menu" id="engineMenu">
        <div onclick="setEngine('Google')">Google</div>
        <div onclick="setEngine('Bing')">Bing</div>
        <div onclick="setEngine('Wikipedia')">Wikipedia</div>
        <div onclick="setEngine('YouTube')">YouTube</div>
        <div onclick="setEngine('DuckDuckGo')">DuckDuckGo</div>
    </div>
</div>

<!-- apps -->
<div class="grid">
<div class="appicon"><div class="iconbox"><i class="fab fa-facebook"></i></div>Facebook</div>
<div class="appicon"><div class="iconbox"><i class="fab fa-youtube"></i></div>YouTube</div>
<div class="appicon"><div class="iconbox"><i class="fab fa-instagram"></i></div>Instagram</div>
<div class="appicon"><div class="iconbox"><i class="fab fa-spotify"></i></div>Spotify</div>
</div>

<!-- footer -->
<div class="footer">
<div class="badge">⚡ Swift AI</div>
</div>

<!-- CHATBOT FLOATING ICON AND PANEL -->
<div class="chatbot-float" id="chatbotToggle">
<img src="https://github.com/Saga-Academy/swift-browser/blob/main/RAW/ai.png?raw=true" alt="ai">
</div>

<div class="chatbot-panel" id="chatbotPanel">
<div class="chatbot-header">
<h3><i class="fas fa-robot"></i> Swift AI Assistant</h3>
<button id="closeChatbot"><i class="fas fa-times"></i></button>
</div>
<div class="chatbot-messages" id="chatbotMessages">
<div class="message bot">
👋 Hi! I'm your Swift AI assistant. Ask me anything about browsing, search the web, or just chat!
</div>
</div>
<div class="chatbot-input">
<input type="text" id="chatbotInput" placeholder="Type your message..." disabled>
<button id="sendMessage" disabled><i class="fas fa-paper-plane"></i></button>
</div>
</div>

</div>

<script>
// ========== SIDEBAR TOGGLE ==========
function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("open");
}

// ========== CHATBOT FUNCTIONALITY ==========
document.addEventListener('DOMContentLoaded', function() {
    const chatbotToggle = document.getElementById('chatbotToggle');
    const chatbotPanel = document.getElementById('chatbotPanel');
    const closeChatbot = document.getElementById('closeChatbot');
    const chatbotInput = document.getElementById('chatbotInput');
    const sendButton = document.getElementById('sendMessage');
    const messagesContainer = document.getElementById('chatbotMessages');
    
    let isOpen = false;
    let isLoading = false;
    
    // Improved demo mode with contextual responses
    const demoResponses = [
        "That's interesting! Tell me more.",
        "I'm your Swift AI assistant. How can I help you browse better?",
        "You can ask me to search for websites, find information, or just chat!",
        "The weather is nice today for browsing! ☀️",
        "Swift Browser makes your mobile experience faster and smarter.",
        "I'm here to help you navigate the web more efficiently.",
        "That's a great question about browsing!",
        "You can customize your Swift Browser experience in settings.",
        "I'm learning new things every day to assist you better!"
    ];
    
    // Open chatbot
    chatbotToggle.addEventListener('click', function(e) {
        e.stopPropagation();
        chatbotPanel.classList.add('open');
        chatbotInput.disabled = false;
        chatbotInput.focus();
        isOpen = true;
        if (chatbotInput.value.trim()) {
            sendButton.disabled = false;
        } else {
            sendButton.disabled = true;
        }
    });
    
    // Close chatbot
    closeChatbot.addEventListener('click', function(e) {
        e.stopPropagation();
        chatbotPanel.classList.remove('open');
        chatbotInput.disabled = true;
        sendButton.disabled = true;
        isOpen = false;
    });
    
    // Enable/disable send button based on input
    chatbotInput.addEventListener('input', function() {
        if (isOpen && !isLoading) {
            sendButton.disabled = !this.value.trim();
        }
    });
    
    // Handle enter key
    chatbotInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && !e.shiftKey && !sendButton.disabled && !isLoading) {
            e.preventDefault();
            sendMessage();
        }
    });
    
    // Send message
    sendButton.addEventListener('click', function() {
        if (!sendButton.disabled && !isLoading) {
            sendMessage();
        }
    });
    
    function addMessage(text, sender) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender}`;
        messageDiv.textContent = text;
        messagesContainer.appendChild(messageDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    function showTypingIndicator() {
        const indicator = document.createElement('div');
        indicator.className = 'typing-indicator';
        indicator.id = 'typingIndicator';
        indicator.innerHTML = '<span></span><span></span><span></span>';
        messagesContainer.appendChild(indicator);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    function removeTypingIndicator() {
        const indicator = document.getElementById('typingIndicator');
        if (indicator) {
            indicator.remove();
        }
    }
    
    async function sendMessage() {
        const message = chatbotInput.value.trim();
        if (!message || isLoading) return;
        
        // Add user message
        addMessage(message, 'user');
        chatbotInput.value = '';
        sendButton.disabled = true;
        
        // Show typing indicator
        isLoading = true;
        showTypingIndicator();
        
        try {
            let botResponse;
            
            // Improved contextual demo mode
            await new Promise(resolve => setTimeout(resolve, 800)); // Simulate network delay
            
            const lowerMsg = message.toLowerCase();
            
            if (lowerMsg.includes('hello') || lowerMsg.includes('hi') || lowerMsg.includes('hey')) {
                botResponse = "Hello there! 👋 How can I assist with your browsing today?";
            } else if (lowerMsg.includes('search') || lowerMsg.includes('find') || lowerMsg.includes('look for')) {
                botResponse = "You can use the search bar at the top. Just type your query and press Enter. I can also help you find things—what are you looking for?";
            } else if (lowerMsg.includes('weather')) {
                botResponse = "To check weather, type 'weather [city]' in the main search bar. For example: 'weather London'";
            } else if (lowerMsg.includes('thank')) {
                botResponse = "You're very welcome! 😊 Let me know if you need anything else.";
            } else if (lowerMsg.includes('who are you') || lowerMsg.includes('what can you do')) {
                botResponse = "I'm Swift AI, your intelligent browsing assistant built right into this mobile browser. I can answer questions, give browsing tips, or just chat!";
            } else if (lowerMsg.includes('joke')) {
                botResponse = "Why did the browser go to therapy? It had too many issues! 😄";
            } else if (lowerMsg.includes('facebook') || lowerMsg.includes('instagram') || lowerMsg.includes('youtube') || lowerMsg.includes('spotify')) {
                botResponse = "You can open that app by tapping its icon in the grid below!";
            } else {
                // Random fallback
                const randomIndex = Math.floor(Math.random() * demoResponses.length);
                botResponse = demoResponses[randomIndex];
            }
            
            removeTypingIndicator();
            addMessage(botResponse, 'bot');
            
        } catch (error) {
            console.error('Chatbot error:', error);
            removeTypingIndicator();
            addMessage('Sorry, I encountered an error. Please try again.', 'error');
        } finally {
            isLoading = false;
            if (isOpen) {
                chatbotInput.disabled = false;
                chatbotInput.focus();
                if (chatbotInput.value.trim()) {
                    sendButton.disabled = false;
                }
            }
        }
    }
});

// ========== SEARCH & ENGINE ==========
const searchInput = document.getElementById('searchInput');
let currentEngine = "Google";

function toggleEngineMenu(){
    document.getElementById("engineMenu").classList.toggle("open");
}

function setEngine(engine){
    currentEngine = engine;
    document.getElementById("currentEngine").innerText = engine;
    document.getElementById("engineMenu").classList.remove("open");
}

if (searchInput) {
    searchInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            const query = this.value.trim();
            if (!query) return;

            let url = "";
            switch(currentEngine){
                case "Google":
                    url = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
                    break;
                case "Bing":
                    url = `https://www.bing.com/search?q=${encodeURIComponent(query)}`;
                    break;
                case "Wikipedia":
                    url = `https://en.wikipedia.org/wiki/${encodeURIComponent(query.replace(/ /g, '_'))}`;
                    break;
                case "YouTube":
                    url = `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
                    break;
                case "DuckDuckGo":
                    url = `https://duckduckgo.com/?q=${encodeURIComponent(query)}`;
                    break;
                default:
                    url = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            }
            window.open(url, "_blank");
        }
    });
}

// ========== THEME TOGGLE (improved) ==========
const themeToggle = document.getElementById('themeToggle');
let isLightMode = false;

themeToggle.addEventListener('click', function() {
    isLightMode = !isLightMode;
    const app = document.querySelector('.app');
    if (isLightMode) {
        app.style.background = '#fff';
        app.style.color = '#000';
        themeToggle.className = 'fas fa-moon';
        // also adjust overlays for readability
        document.querySelector('.overlay').style.background = 'rgba(255,255,255,0.2)';
    } else {
        app.style.background = '#000';
        app.style.color = 'white';
        themeToggle.className = 'fas fa-sun';
        document.querySelector('.overlay').style.background = 'rgba(0,0,0,0.2)';
    }
});

// ========== APP ICON ACTIONS (fixed) ==========
document.querySelectorAll('.appicon').forEach((item, index) => {
    item.addEventListener('click', function() {
        const apps = ['facebook', 'youtube', 'instagram', 'spotify'];
        const urls = {
            facebook: 'https://facebook.com',
            youtube: 'https://youtube.com',
            instagram: 'https://instagram.com',
            spotify: 'https://open.spotify.com'
        };
        window.open(urls[apps[index]], '_blank');
    });
});

// ========== NEW TAB BUTTON ==========
const newTabButtons = document.querySelectorAll('.newtab button');
if (newTabButtons.length >= 2) {
    newTabButtons[0].addEventListener('click', function() {
        window.open('about:blank', '_blank');
    });
    newTabButtons[1].addEventListener('click', function() {
        searchInput.value = '';
        searchInput.focus();
    });
}

// ========== CLOSE ENGINE MENU WHEN CLICK OUTSIDE ==========
document.addEventListener("click", function(e){
    const menu = document.getElementById("engineMenu");
    const button = document.querySelector(".engine-select");

    if(button && !button.contains(e.target) && menu && !menu.contains(e.target)){
        menu.classList.remove("open");
    }
});

// ========== PREVENT CLICK EVENTS FROM BUBBLING THROUGH OVERLAY ==========
document.getElementById('clickOverlay').addEventListener('click', function(e) {
    // just a placeholder, can be used to close panels if needed
});

// ========== FIX HISTORY BUTTONS (they might not work if no history) ==========
// but keep them as they are, they will work if there's history

// ========== FIX: ensure chatbot input is enabled only when panel open ==========
// already handled in chatbot logic

// ========== ADD TOUCH/FOCUS improvements ==========
</script>

</body>
</html>
